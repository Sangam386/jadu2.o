<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadoo</title>
    <meta
      name="description"
      content="Use this replica computer interface to call Jadoo from Koi Mil Gaya."
    />
    <meta name="author" content="Arjun Munji" />
    <meta name="twitter:creator" content="@arjundot" />
    <meta name="article:author" content="https://facebook.com/arjun.munji" />
    <meta
      name="keywords"
      content="jadoo,koi mil gaya,hrithik roshan,alien,computer"
    />
    <meta property="og:image" content="https://arjun.ninja/jadoo/assets/jadoo.png" />
    <meta property="og:title" content="Jadoo" />
    <meta property="og:url" content="https://arjun.ninja/jadoo" />
    <meta property="og:site_name" content="Arjun Munji" />
    <meta property="og:type" content="article" />

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/ellipse.css" />
    <link rel="stylesheet" href="css/wave.css" />
    <link
      rel="icon"
      type="image/png"
      href="assets/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="assets/favicon-16x16.png"
      sizes="16x16"
    />
  </head>
  <body>
    <noscript>
      <div style="color:#95e208;background:#000;padding:2em;font-family:monospace;text-align:center;">
        JADOO requires JavaScript to run. Please enable JavaScript in your browser.
      </div>
    </noscript>
    <div class="background-image"></div>
    <div id="monitor" class="crt content">
      <img class="background" src="assets/refresh.gif" alt="" />
      <div class="crt-overlay"></div>
      <div class="crt-flicker"></div>
      <div class="enter-text">
        <h1>press enter to continue</h1>
      </div>
      <div class="line vline nodisplay"></div>
      <div class="line hline nodisplay"></div>
      <div class="line hline1 nodisplay"></div>
      <div class="line hline2 nodisplay"></div>
      <div class="wrap nodisplay">
        <div class="circle"><div class="radar radar1"></div></div>
        <div class="circle"><div class="radar radar2"></div></div>
        <div class="circle"><div class="radar radar3"></div></div>
        <div class="circle"></div>
      </div>
      <pre class="garbage garbage-left nodisplay">uplink = yes
 axis. = 40
  inc. = 48 pos
   dec = 57 neg

signal = 80 b</pre>
      <pre class="garbage garbage-right nodisplay">B:066
C:067
D:068
E:069
F:070</pre>

      <div class="prompt nodisplay">
        PRESS KEYS <span class="prompt-key"></span>
      </div>
      <div class="sending nodisplay">SENDING</div>
      <div class="receiving nodisplay">RECEIVING</div>
      <div class="header nodisplay">
        JADOO v1
      </div>

      <div class="sea sea-left nodisplay" data-side="left"></div>
      <div class="sea sea-right nodisplay" data-side="right"></div>

      <div class="mobile-keyboard nodisplay">
        <div class="mobile-key" data-key="66">B</div>
        <div class="mobile-key" data-key="67">C</div>
        <div class="mobile-key" data-key="68">D</div>
        <div class="mobile-key" data-key="69">E</div>
        <div class="mobile-key" data-key="70">F</div>
      </div>
    </div>
    <audio data-key="66" src="assets/B.mp3" preload="auto"></audio>
    <audio data-key="67" src="assets/C.mp3" preload="auto"></audio>
    <audio data-key="68" src="assets/D.mp3" preload="auto"></audio>
    <audio data-key="69" src="assets/E.mp3" preload="auto"></audio>
    <audio data-key="70" src="assets/F.mp3" preload="auto"></audio>

    <script src="js/crt.js"></script>
  </body>
</html>
